services:
  db:
    image: mariadb:11.4
    container_name: bookstack-db
    environment:
      - TZ=${TZ:-Australia/Sydney}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-change-this-root-password}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-bookstack}
      - MYSQL_USER=${MYSQL_USER:-bookstack}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-change-this-db-password}
    volumes:
      - ./data/mariadb:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  bookstack:
    image: lscr.io/linuxserver/bookstack:latest
    container_name: bookstack
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Australia/Sydney}
      - APP_URL=${APP_URL:-http://localhost:6875}
      - APP_KEY=${APP_KEY:-base64:replace-with-generated-key}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USERNAME=${MYSQL_USER:-bookstack}
      - DB_PASSWORD=${MYSQL_PASSWORD:-change-this-db-password}
      - DB_DATABASE=${MYSQL_DATABASE:-bookstack}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-database}
    volumes:
      - ./data/bookstack:/config
    ports:
      - "6875:80"
    restart: unless-stopped



