name = "braille-wiki-api"
main = "src/worker.ts"
compatibility_date = "2026-04-06"
compatibility_flags = ["nodejs_compat", "nodejs_compat_populate_process_env"]
alias = { "@braille-wiki/editor-schema/server" = "../../packages/editor-schema/src/serializer-server.ts" }

[vars]
NODE_ENV = "production"
R2_PUBLIC_URL = "https://s3.braille.ay.ms"
ADMIN_ORIGIN = "https://admin.braille.ay.ms"

# Secrets (set via: wrangler secret put <NAME> --name braille-wiki-api)
# DATABASE_URL
# BETTER_AUTH_SECRET

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "braille-wiki"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[[routes]]
pattern = "api.braille.ay.ms"
custom_domain = true