name = "braille-wiki-web"
compatibility_date = "2026-04-06"
compatibility_flags = ["nodejs_compat", "nodejs_compat_populate_process_env"]

[vars]
PUBLIC_API_URL = "https://api.braille.ay.ms"

# Secrets (set via: wrangler secret put <NAME> --name braille-wiki-web)
# DATABASE_URL
# INTERNAL_SECRET

[assets]
directory = "./dist/client"
binding = "ASSETS"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[[routes]]
pattern = "wiki.braille.ay.ms"
custom_domain = true
